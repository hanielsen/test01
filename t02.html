<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Firkant</title>
<meta name="viewport" content="user-scalable=no, width=device-width, initial-scale=1">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="icon" href="tk.png">
<link rel="apple-touch-icon" href="tk.png">

<style>
* {
  box-sizing: border-box;
}
body   
{
    font-family: sans-serif;

}
h1 
{
    font-size:1em;
    margin-bottom: 4px;
}
#f1, #f2, #f3
{
    font-size:1em;
}
#canvas
{
    border: solid 1px black;
}
</style>
</head>

<body ontouchmove="BlockMove(event);">
<h1>FIRKANT</h1>
<canvas id="canvas" width="373px" height="300px">
</canvas> 
<script>
var canvas = document.getElementById("canvas");
var ctx = canvas.getContext("2d");
ctx.beginPath();
ctx.moveTo(0,299);
ctx.lineTo(299,299);
ctx.lineTo(299,10);
ctx.lineTo(0,299);
ctx.stroke();
ctx.font = "10px sans-serif";
ctx.textBaseline="middle";
ctx.textAlign="left";
ctx.fillText("x",20,36);
ctx.fillText("y",36,20);
ctx.fillText("z",15,15);
ctx.font = "14px sans-serif";
ctx.fillText("Indtast 2. Beregn 3.",50,20);


function BlockMove(event) 
{
    event.preventDefault();
}


</script>
</body>
</html>
